services:
  koncerto-app:
    build:
      context: .
      dockerfile: koncerto-app/Dockerfile
    ports:
      - "${KONCERTO_PORT:-17348}:17348"
    environment:
      KONCERTO_WORKFLOW_PATH: /config/WORKFLOW.md
      KONCERTO_LOGS_ROOT: /logs
      KONCERTO_WEB_TYPE: reactive
      KONCERTO_DASHBOARD_PORT: "17348"
      KONCERTO_ADMIN_API_KEY: "${KONCERTO_ADMIN_API_KEY:-}"
      LINEAR_API_KEY: "${LINEAR_API_KEY:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      KONCERTO_WORKSPACE_ROOT: /workspace
      GH_TOKEN: "${GH_TOKEN:-}"
      GIT_REMOTE_URL: "${GIT_REMOTE_URL:-}"
    volumes:
      - .:/config
      - koncerto-logs:/logs
      - koncerto-data:/data
      - koncerto-workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - koncerto-codex:/root/.codex
      - koncerto-claude:/root/.claude
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
    privileged: true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:17348/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - koncerto-network
    restart: unless-stopped

  koncerto-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    depends_on:
      koncerto-app:
        condition: service_healthy
    environment:
      KONCERTO_APP_URL: http://koncerto-app:17348
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - koncerto-network
    restart: unless-stopped
    profiles:
      - agent

networks:
  koncerto-network:
    driver: bridge

volumes:
  koncerto-logs:
  koncerto-data:
  koncerto-workspace:
  koncerto-codex:
  koncerto-claude:
