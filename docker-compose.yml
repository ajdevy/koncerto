services:
  koncerto:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: koncerto
    ports:
      - "8080:8080"
    environment:
      - KONCERTO_WORKFLOW_PATH=/config/workflows
      - KONCERTO_LOGS_ROOT=/logs
      - KONCERTO_DB_PATH=/data/koncerto.db
      - SPRING_PROFILES_ACTIVE=production
    volumes:
      - workflow-config:/config/workflows
      - logs:/logs
      - db:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    networks:
      - koncerto-network

volumes:
  workflow-config:
    driver: local
  logs:
    driver: local
  db:
    driver: local

networks:
  koncerto-network:
    driver: bridge