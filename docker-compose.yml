services:
  koncerto-app:
    build:
      context: .
      dockerfile: koncerto-app/Dockerfile
    network_mode: "host"
    environment:
      KONCERTO_WORKFLOW_PATH: /config/WORKFLOW.md
      KONCERTO_LOGS_ROOT: /logs
      KONCERTO_WEB_TYPE: reactive
      KONCERTO_DASHBOARD_PORT: "17348"
      KONCERTO_ADMIN_API_KEY: "${KONCERTO_ADMIN_API_KEY:-}"
      LINEAR_API_KEY: "${LINEAR_API_KEY:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      KONCERTO_WORKSPACE_ROOT: /workspace
      GH_TOKEN: "${GH_TOKEN:-}"
      GIT_REMOTE_URL: "${GIT_REMOTE_URL:-}"
      R2_ENDPOINT: "${R2_ENDPOINT:-}"
      R2_ACCESS_KEY: "${R2_ACCESS_KEY:-}"
      R2_SECRET_KEY: "${R2_SECRET_KEY:-}"
      R2_BUCKET: "${R2_BUCKET:-}"
      R2_PUBLIC_URL_BASE: "${R2_PUBLIC_URL_BASE:-}"
    volumes:
      - .:/config
      - koncerto-logs:/logs
      - koncerto-data:/data
      - koncerto-workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - koncerto-codex:/root/.codex
      - koncerto-claude:/root/.claude
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
    privileged: true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:17348/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  koncerto-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    depends_on:
      koncerto-app:
        condition: service_healthy
    environment:
      KONCERTO_APP_URL: http://host.docker.internal:17348
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    profiles:
      - agent

volumes:
  koncerto-logs:
  koncerto-data:
  koncerto-workspace:
  koncerto-codex:
  koncerto-claude:
