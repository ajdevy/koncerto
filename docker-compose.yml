services:
  koncerto-app:
    build:
      context: .
      dockerfile: koncerto-app/Dockerfile
    ports:
      - "${KONCERTO_PORT:-17348}:17348"
    environment:
      KONCERTO_WORKFLOW_PATH: /config/WORKFLOW.md
      KONCERTO_LOGS_ROOT: /logs
      KONCERTO_WEB_TYPE: servlet
      KONCERTO_DASHBOARD_PORT: "17348"
      KONCERTO_ADMIN_API_KEY: "${KONCERTO_ADMIN_API_KEY:-}"
    volumes:
      - ./workflows:/config
      - koncerto-logs:/logs
      - koncerto-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:17348/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - koncerto-network
    restart: unless-stopped

  koncerto-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    depends_on:
      koncerto-app:
        condition: service_healthy
    environment:
      KONCERTO_APP_URL: http://koncerto-app:17348
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - koncerto-network
    restart: unless-stopped
    profiles:
      - agent

networks:
  koncerto-network:
    driver: bridge

volumes:
  koncerto-logs:
  koncerto-data:
