name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  story-integrity:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check story file integrity
        run: |
          scripts/story-integrity-check.sh --base "origin/${{ github.base_ref }}"

  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for push

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build jacocoTestReport -Pjacoco --no-daemon --stacktrace

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/test/**'
          retention-days: 3

      - name: Aggregate coverage and generate badge
        if: github.ref == 'refs/heads/main'
        run: python3 scripts/coverage-badge.py

      - name: Commit badges
        if: github.ref == 'refs/heads/main'
        run: |
          if [[ -n "$(git status --porcelain .badges/)" ]]; then
            git config --global user.name 'github-actions'
            git config --global user.email 'github-actions@github.com'
            git add .badges/
            git commit -m "chore: update coverage badges [skip ci]"
            git push
          fi
