name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build jacocoTestReport --no-daemon

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: |
            koncerto-core/build/reports/jacoco/test/jacocoTestReport.xml
            koncerto-logging/build/reports/jacoco/test/jacocoTestReport.xml
            koncerto-workflow/build/reports/jacoco/test/jacocoTestReport.xml
            koncerto-workspace/build/reports/jacoco/test/jacocoTestReport.xml
            koncerto-linear/build/reports/jacoco/test/jacocoTestReport.xml
            koncerto-agent/build/reports/jacoco/test/jacocoTestReport.xml
            koncerto-orchestrator/build/reports/jacoco/test/jacocoTestReport.xml
            koncerto-dashboard/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
