name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build jacocoTestReport -Pjacoco --no-daemon

      - name: Generate and commit coverage badge
        if: github.ref == 'refs/heads/main'
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-location: |
            koncerto-core/build/reports/jacoco/test/jacocoTestReport.csv
            koncerto-logging/build/reports/jacoco/test/jacocoTestReport.csv
            koncerto-workflow/build/reports/jacoco/test/jacocoTestReport.csv
            koncerto-workspace/build/reports/jacoco/test/jacocoTestReport.csv
            koncerto-linear/build/reports/jacoco/test/jacocoTestReport.csv
            koncerto-agent/build/reports/jacoco/test/jacocoTestReport.csv
            koncerto-orchestrator/build/reports/jacoco/test/jacocoTestReport.csv
            koncerto-dashboard/build/reports/jacoco/test/jacocoTestReport.csv
            koncerto-app/build/reports/jacoco/test/jacocoTestReport.csv
          badges-directory: .badges
          generate-summary: true
          commit: true
          commit-message: "chore: update coverage badges [skip ci]"
