name: Recorder Image

# Builds the lean demo-recorder image and publishes it to ghcr, so Koncerto only ever pulls a
# small prebaked image instead of building one locally or pulling the ~2GB upstream Playwright
# image. Runs in CI (clean networking) where the apk package fetches that fail on constrained
# local Docker VMs succeed reliably.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile.recorder
      - .github/workflows/recorder-image.yml
  pull_request:
    branches: [main]
    paths:
      - Dockerfile.recorder
      - .github/workflows/recorder-image.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/koncerto-recorder

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push recorder image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.recorder
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
