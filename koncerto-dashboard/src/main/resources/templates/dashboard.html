<!DOCTYPE html>
<html>
<head>
    <title>Koncerto Dashboard</title>
    <style>
        body { font-family: monospace; padding: 1rem; background: #111; color: #eee; }
        h1 { color: #6cf; }
        table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
        th, td { border: 1px solid #444; padding: 0.4rem; text-align: left; }
        th { background: #222; }
        .totals { margin-top: 1rem; }
        .output { display: none; background: #000; color: #0f0; padding: 0.5rem; max-height: 300px; overflow-y: auto; white-space: pre-wrap; font-size: 0.8rem; }
        .output.open { display: block; }
        .btn-out { cursor: pointer; padding: 0.1rem 0.5rem; background: #333; color: #6cf; border: 1px solid #555; }
    </style>
</head>
<body>
    <h1>Koncerto Dashboard</h1>
    <p>Live orchestrator state</p>
    <div class="totals">
        <strong>Tokens:</strong> <span id="totals">loading...</span>
    </div>
    <h2>Running</h2>
    <table id="running"><thead><tr><th>Identifier</th><th>Thread</th><th>Turns</th><th>URL</th><th>Output</th></tr></thead><tbody></tbody></table>
    <h2>Retrying</h2>
    <table id="retrying"><thead><tr><th>Identifier</th><th>Attempt</th><th>Error</th></tr></thead><tbody></tbody></table>
    <script>
        const outputSources = {};
        async function refresh() {
            const r = await fetch('/api/v1/state');
            const s = await r.json();
            document.getElementById('totals').textContent =
                `in=${s.tokenTotals.inputTokens} out=${s.tokenTotals.outputTokens} total=${s.tokenTotals.totalTokens}`;
            const ids = new Set(s.running.map(x => x.issueIdentifier));
            for (const id of Object.keys(outputSources)) {
                if (!ids.has(id)) { outputSources[id].close(); delete outputSources[id]; }
            }
            const rb = document.querySelector('#running tbody');
            rb.innerHTML = s.running.map(x => `<tr><td>${x.issueIdentifier}</td><td>${x.threadId}</td><td>${x.turnCount}</td><td>${x.url ?? ''}</td><td><button class="btn-out" onclick="toggleOutput('${x.issueIdentifier}')">View</button></td></tr>` +
                `<tr id="outrow-${x.issueIdentifier}" style="display:none"><td colspan="5"><pre class="output" id="out-${x.issueIdentifier}"></pre></td></tr>`).join('');
            const rt = document.querySelector('#retrying tbody');
            rt.innerHTML = s.retrying.map(x => `<tr><td>${x.identifier}</td><td>${x.attempt}</td><td>${x.error ?? ''}</td></tr>`).join('');
        }
        function toggleOutput(id) {
            const row = document.getElementById('outrow-' + id);
            if (!row) return;
            const pre = document.getElementById('out-' + id);
            if (row.style.display === 'table-row') {
                row.style.display = 'none';
                if (outputSources[id]) { outputSources[id].close(); delete outputSources[id]; }
                return;
            }
            row.style.display = 'table-row';
            pre.classList.add('open');
            if (!outputSources[id]) {
                outputSources[id] = new EventSource('/api/v1/running/' + id + '/output/stream');
                outputSources[id].addEventListener('output', function(e) {
                    pre.textContent += e.data + '\n';
                    pre.scrollTop = pre.scrollHeight;
                });
                outputSources[id].onerror = function() { closeOutput(id); };
            }
        }
        function closeOutput(id) {
            if (outputSources[id]) { outputSources[id].close(); delete outputSources[id]; }
            const row = document.getElementById('outrow-' + id);
            if (row) row.style.display = 'none';
        }
        refresh();
        setInterval(refresh, 5000);
    </script>
</body>
</html>
